# Render Blueprint — deploys this app as a free web service.
# Render reads this automatically when you choose "New > Blueprint".
# Docs: https://render.com/docs/blueprint-spec
#
# NOTE: the service name deliberately avoids the word "proxy" — Render has
# suspended projects merely *named* "proxy". Rename freely, but keep it neutral.
services:
  - type: web
    name: freebrowse
    runtime: node
    plan: free
    # Pick the region CLOSEST to you — this is the single biggest speed factor.
    # Options: singapore | frankfurt | oregon | ohio | virginia
    region: singapore       # closest for India / South-East Asia
    branch: main
    buildCommand: npm install
    startCommand: node src/index.js
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"          # app requires Node >=16; 22 is current LTS
      # Shown as this backend's name in the on-site meter board. Set a distinct
      # label per deployment (e.g. "Singapore", "Frankfurt") when you run several.
      - key: REGION_LABEL
        value: "Singapore"
      # Optional access PIN. Leave unset and the site is fully open. Set it to
      # require a PIN before anyone can use the proxy (recommended for a public
      # URL — protects bandwidth and lowers suspension risk). Use a LONG, RANDOM
      # value (10+ chars) — short PINs are brute-forceable. Uncomment + redeploy:
      # - key: ACCESS_PIN
      #   value: "change-me-to-a-long-random-string"
