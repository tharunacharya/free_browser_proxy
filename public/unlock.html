<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>FreeBrowse — Unlock</title>
		<link rel="shortcut icon" href="favicon.ico" />
		<style>
			* { box-sizing: border-box; }
			html, body { height: 100%; margin: 0; }
			body {
				font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
				color: #e8ecf6;
				background:
					radial-gradient(900px 600px at 15% -10%, rgba(110,168,254,0.20), transparent 60%),
					radial-gradient(800px 500px at 110% 10%, rgba(139,92,246,0.18), transparent 55%),
					linear-gradient(160deg, #0b1020, #131a32);
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 24px;
			}
			form {
				width: 100%;
				max-width: 360px;
				text-align: center;
				background: rgba(255, 255, 255, 0.04);
				border: 1px solid rgba(255, 255, 255, 0.12);
				border-radius: 18px;
				padding: 28px 24px;
				backdrop-filter: blur(8px);
				box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
			}
			h1 {
				margin: 0 0 4px;
				font-size: 1.8rem;
				background: linear-gradient(135deg, #fff, #b9c6ef);
				-webkit-background-clip: text;
				background-clip: text;
				color: transparent;
			}
			p { color: #9aa6c2; margin: 0 0 18px; }
			input {
				width: 100%;
				border: 1px solid rgba(255, 255, 255, 0.15);
				background: rgba(0, 0, 0, 0.25);
				color: #e8ecf6;
				font-size: 1.05rem;
				padding: 13px 14px;
				border-radius: 12px;
				outline: 0;
			}
			input:focus { border-color: #6ea8fe; }
			button {
				width: 100%;
				margin-top: 12px;
				border: 0;
				border-radius: 12px;
				padding: 13px;
				font-size: 1rem;
				font-weight: 600;
				color: #0b1020;
				cursor: pointer;
				background: linear-gradient(135deg, #6ea8fe, #8b5cf6);
			}
			button:hover { filter: brightness(1.08); }
			#err { color: #ff7b7b; min-height: 1.2em; margin: 12px 0 0; }
		</style>
	</head>
	<body>
		<form id="f">
			<h1>FreeBrowse</h1>
			<p>Enter access PIN to continue</p>
			<input
				id="pin"
				type="password"
				autocomplete="off"
				placeholder="••••••"
				autofocus
			/>
			<button type="submit">Unlock</button>
			<p id="err"></p>
		</form>
		<script>
			const f = document.getElementById("f");
			const pin = document.getElementById("pin");
			const err = document.getElementById("err");
			f.addEventListener("submit", async (e) => {
				e.preventDefault();
				err.textContent = "";
				try {
					const r = await fetch("/unlock", {
						method: "POST",
						headers: { "content-type": "application/json" },
						body: JSON.stringify({ pin: pin.value }),
					});
					if (r.ok) {
						location.href = "/";
					} else if (r.status === 429) {
						err.textContent = "Too many attempts — wait a minute.";
					} else {
						err.textContent = "Wrong PIN.";
						pin.value = "";
						pin.focus();
					}
				} catch {
					err.textContent = "Network error — try again.";
				}
			});
		</script>
	</body>
</html>
